name: Release candidate

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-draft:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ASTRO_TELEMETRY_DISABLED: 1
    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.5.0
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - name: Validate tag and install
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          tag_version=${GITHUB_REF_NAME#v}
          tag_version=${tag_version%%-*}
          tag_version=${tag_version%%+*}
          test "$tag_version" = "$version"
          pnpm install --frozen-lockfile
      - name: Run release validation
        run: pnpm test
      - name: Package static site and licenses
        shell: bash
        run: |
          bash scripts/build-release.sh "$GITHUB_REF_NAME" dist-release
          pnpm licenses:report
          mv third-party-licenses.json dist-release/
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: dist-release/voiceasset-site-source.cdx.json
          upload-artifact: false
      - name: Generate checksums and verify artifacts
        shell: bash
        run: |
          bash scripts/write-checksums.sh dist-release
          bash scripts/verify-release.sh "$GITHUB_REF_NAME" dist-release --require-sbom
      - name: Create or update draft prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            test "$(gh release view "$GITHUB_REF_NAME" --json isDraft --jq .isDraft)" = true
            gh release upload "$GITHUB_REF_NAME" dist-release/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist-release/* --verify-tag --draft --prerelease \
              --generate-notes --title "VoiceAsset Site $GITHUB_REF_NAME"
          fi
