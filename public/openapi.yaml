        priority:
          type: integer
          minimum: 1
          maximum: 1000
          default: 100
    UpdateProviderProfileRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        display_name:
          type: string
          minLength: 1
          maxLength: 100
        config:
          $ref: '#/components/schemas/ASRProviderConfig'
        credentials:
          $ref: '#/components/schemas/ProviderCredentials'
        state:
          type: string
          enum: [enabled, disabled]
        priority:
          type: integer
          minimum: 1
          maximum: 1000
    ProviderCredentials:
