        state:
          $ref: '#/components/schemas/HotwordState'
        entries:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: '#/components/schemas/HotwordEntryInput'
    AddHotwordSetVersionRequest:
      type: object
      additionalProperties: false
