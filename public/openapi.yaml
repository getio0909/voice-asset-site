        priority:
          type: integer
          minimum: 1
          maximum: 1000
          default: 100
    UpdateLLMProfileRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        display_name:
          type: string
          minLength: 1
          maxLength: 100
        config:
          $ref: '#/components/schemas/LLMConfig'
        credentials:
          $ref: '#/components/schemas/LLMCredentials'
        state:
          type: string
          enum: [enabled, disabled]
        priority:
          type: integer
          minimum: 1
          maximum: 1000
    LLMProviderID:
