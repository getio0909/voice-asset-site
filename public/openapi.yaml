components:
  securitySchemes:
    SessionCookie:
      type: apiKey
      in: cookie
      name: voiceasset_session
      description: >-
        Opaque HttpOnly session cookie. Unsafe cookie-authenticated operations
        also require Origin to equal the configured public origin.
    RefreshCookie:
      type: apiKey
      in: cookie
      name: voiceasset_refresh
      description: >-
        Opaque HttpOnly refresh cookie scoped to `/api/v1/auth`. It is accepted
        only by the rotation endpoint together with the exact configured Origin.
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: VoiceAsset opaque token
      description: >-
        Opaque session token beginning with `va_`, or scoped API key beginning
        with `va_pat_`. If both cookie and bearer credentials are sent, they
        must contain the same token. API keys cannot revoke web sessions.
  parameters:
    XRequestID:
      name: X-Request-ID
      in: header
      required: false
      description: Optional caller correlation ID; oversized values are replaced.
      schema:
        type: string
        minLength: 1
        maxLength: 200
    Origin:
      name: Origin
      in: header
      required: false
      description: >-
        Browser origin. Required and exact for unsafe cookie-authenticated
        operations; optional for bearer authentication.
      schema:
        type: string
        format: uri
    RequiredOrigin:
      name: Origin
      in: header
      required: true
      description: >-
        Exact HTTP(S) origin encoded by the one-time pairing payload. Redirects
        or alternate origins are not accepted.
      schema:
        type: string
        format: uri
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Caller-generated retry key scoped to the operation and workspace.
      schema:
        type: string
        minLength: 1
        maxLength: 200
    AssetID:
      name: asset_id
      in: path
      required: true
      description: Voice asset identifier.
      schema:
        type: string
        format: uuid
    AssetPurgeJobID:
      name: purge_job_id
      in: path
      required: true
      description: Permanent asset-deletion job identifier.
      schema:
        type: string
        format: uuid
    CollectionID:
      name: collection_id
      in: path
      required: true
      description: Workspace collection identifier.
      schema:
        type: string
        format: uuid
    APIKeyID:
      name: api_key_id
      in: path
      required: true
      description: Workspace API-key identifier.
      schema:
        type: string
        format: uuid
    DeviceSessionID:
      name: device_session_id
      in: path
      required: true
      description: Personal device-session identifier.
      schema:
        type: string
        format: uuid
    PairingSessionID:
      name: pairing_session_id
      in: path
      required: true
      description: One-time device-pairing session identifier.
      schema:
        type: string
        format: uuid
    AssetSearchQuery:
      name: q
      in: query
      required: false
      description: >-
        PostgreSQL full-text terms matched against asset titles and segments in
        each Transcript's latest immutable Revision. Literal matching is retained
        for titles and languages that are not tokenized by the simple dictionary.
      schema:
        type: string
        maxLength: 200
    AssetCollectionFilter:
      name: collection_id
      in: query
      required: false
      description: Return only assets assigned to this workspace collection.
      schema:
        type: string
        format: uuid
    AssetTagFilter:
      name: tag_id
      in: query
      required: false
      description: Return only assets assigned to this workspace tag.
      schema:
        type: string
        format: uuid
    AssetStatusFilter:
      name: status
      in: query
      required: false
      description: Return only assets in this lifecycle or processing status.
      schema:
        type: string
        enum: [draft, uploading, processing, ready, failed, trashed]
    AssetProviderFilter:
      name: provider_id
      in: query
      required: false
      description: Return only assets with a Raw ASR Revision produced by this provider.
      schema:
        type: string
        enum: [mock_asr, aliyun_asr, tencent_asr]
    AssetSpeakerFilter:
      name: speaker
      in: query
      required: false
      description: >-
        Case-insensitive exact Speaker label in a latest immutable Transcript
        Revision. When q is present, Segment text hits are narrowed to this Speaker.
      schema:
        type: string
        minLength: 1
        maxLength: 200
    AssetCreatedFrom:
      name: created_from
      in: query
      required: false
      description: Inclusive lower bound for immutable asset creation time.
      schema:
        type: string
        format: date-time
    AssetCreatedBefore:
      name: created_before
      in: query
      required: false
      description: Exclusive upper bound for immutable asset creation time.
      schema:
        type: string
        format: date-time
    ListLimit:
      name: limit
      in: query
      required: false
      description: Maximum number of assets to return; defaults to 20.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    OrganizationListLimit:
      name: limit
      in: query
      required: false
      description: Maximum number of organization read-model items to return; defaults to 50.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    OperationsListLimit:
      name: limit
      in: query
      required: false
      description: Maximum number of administration read-model items to return; defaults to 50.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    SyncListLimit:
      name: limit
      in: query
      required: false
      description: Maximum number of incremental changes to return; defaults to 50.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    NotificationListLimit:
      name: limit
      in: query
      required: false
      description: Maximum number of personal task events to return; defaults to 50.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    JobStateFilter:
      name: state
      in: query
      required: false
      description: Exact durable job-state filter.
      schema:
        type: string
        enum: [queued, running, retry_wait, succeeded, failed, cancelled]
    JobKindFilter:
      name: kind
      in: query
      required: false
      description: Exact bounded durable job-kind filter.
      schema:
        type: string
        pattern: '^[a-z][a-z0-9_]{0,99}$'
    AuditActorTypeFilter:
      name: actor_type
      in: query
      required: false
      description: Exact immutable audit actor classification.
      schema:
        type: string
        enum: [user, agent, system]
    AuditActionFilter:
      name: action
      in: query
      required: false
      description: Exact bounded audit action filter.
      schema:
        type: string
        pattern: '^[a-z][a-z0-9_.]{0,99}$'
    AuditTargetTypeFilter:
      name: target_type
      in: query
      required: false
      description: Exact bounded audit target-type filter.
      schema:
        type: string
        pattern: '^[a-z][a-z0-9_.]{0,99}$'
    MemberRoleFilter:
      name: role
      in: query
      required: false
      description: Exact workspace-member role filter.
      schema:
        $ref: '#/components/schemas/MemberRole'
    MemberStatusFilter:
      name: status
      in: query
      required: false
      description: Exact workspace-membership status filter.
      schema:
        $ref: '#/components/schemas/MemberStatus'
    ListCursor:
      name: cursor
      in: query
      required: false
      description: Opaque continuation cursor returned by the preceding page.
      schema:
        type: string
        minLength: 1
        maxLength: 1024
    UploadID:
      name: upload_id
      in: path
      required: true
      description: Resumable upload-session identifier.
      schema:
        type: string
        format: uuid
    PartNumber:
      name: part_number
      in: path
      required: true
      description: One-based upload part number.
      schema:
        type: integer
        minimum: 1
        maximum: 10000
    JobID:
      name: job_id
      in: path
      required: true
      description: Durable transcription-job identifier.
      schema:
        type: string
        format: uuid
    RevisionID:
      name: revision_id
      in: path
      required: true
      description: Immutable transcript-revision identifier.
      schema:
        type: string
        format: uuid
    ClipID:
      name: clip_id
      in: path
      required: true
      description: Short-lived immutable audio-clip identifier.
      schema:
        type: string
        format: uuid
    TranscriptExportID:
      name: export_id
      in: path
      required: true
      description: Short-lived immutable transcript-export identifier.
      schema:
        type: string
        format: uuid
    ProviderProfileID:
      name: profile_id
      in: path
      required: true
      description: Workspace ASR provider-profile identifier.
      schema:
        type: string
        format: uuid
    HotwordSetID:
      name: hotword_set_id
      in: path
      required: true
      description: Workspace hotword-set identifier.
      schema:
        type: string
        format: uuid
    GlossarySetID:
      name: glossary_set_id
      in: path
      required: true
      description: Workspace correction-glossary identifier.
      schema:
        type: string
        format: uuid
    LLMProfileID:
      name: profile_id
      in: path
      required: true
      description: Workspace LLM provider-profile identifier.
      schema:
        type: string
        format: uuid
    MemberID:
      name: member_id
      in: path
      required: true
      description: Workspace member user identifier.
      schema:
        type: string
        format: uuid
    WebhookID:
      name: webhook_id
      in: path
      required: true
      description: Workspace outbound Webhook endpoint identifier.
      schema:
        type: string
        format: uuid
    WebhookDeliveryLimit:
      name: limit
      in: query
      required: false
      description: Maximum number of bounded delivery records to return.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    WebhookIfMatch:
      name: If-Match
      in: header
      required: true
      description: Exact quoted Webhook resource version returned in ETag.
      schema:
        type: string
        pattern: '^"[1-9][0-9]*"$'
      example: '"3"'
    ProfileIfMatch:
      name: If-Match
      in: header
      required: true
      description: Exact quoted provider-profile version returned in ETag.
      schema:
        type: string
        pattern: '^"[1-9][0-9]*"$'
      example: '"3"'
    HotwordIfMatch:
      name: If-Match
      in: header
      required: true
      description: Exact quoted hotword resource version returned in ETag.
      schema:
        type: string
        pattern: '^"[1-9][0-9]*"$'
      example: '"3"'
    GlossaryIfMatch:
      name: If-Match
      in: header
      required: true
      description: Exact quoted glossary resource version returned in ETag.
      schema:
        type: string
        pattern: '^"[1-9][0-9]*"$'
      example: '"3"'
    LLMProfileIfMatch:
      name: If-Match
      in: header
      required: true
      description: Exact quoted LLM profile version returned in ETag.
      schema:
        type: string
        pattern: '^"[1-9][0-9]*"$'
      example: '"3"'
    MembershipIfMatch:
      name: If-Match
      in: header
      required: true
      description: Exact quoted membership version returned in ETag.
      schema:
        type: string
        pattern: '^"[1-9][0-9]*"$'
      example: '"3"'
    WorkspaceIfMatch:
      name: If-Match
      in: header
      required: true
      description: Exact quoted workspace version returned in ETag.
      schema:
        type: string
        pattern: '^"[1-9][0-9]*"$'
      example: '"3"'
    AssetIfMatch:
      name: If-Match
      in: header
      required: true
      description: Exact quoted asset version returned in ETag.
      schema:
        type: string
        pattern: '^"[1-9][0-9]*"$'
      example: '"3"'
    XPartSHA256:
      name: X-Part-SHA256
      in: header
      required: true
      description: Lowercase hexadecimal SHA-256 of this part's exact bytes.
      schema:
        $ref: '#/components/schemas/SHA256'
    Range:
      name: Range
      in: header
      required: false
      description: A single RFC 9110 byte range.
      schema:
        type: string
        pattern: '^bytes=(?:[0-9]+-[0-9]*|-[0-9]+)$'
      example: bytes=0-1048575
    IfMatch:
      name: If-Match
      in: header
      required: false
      description: Require the current strong audio ETag to match before serving bytes.
      schema:
        type: string
      example: '"0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"'
    IfNoneMatch:
      name: If-None-Match
      in: header
      required: false
      description: Return 304 when the current audio ETag matches.
      schema:
        type: string
      example: '"0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"'
    IfRange:
      name: If-Range
      in: header
      required: false
      description: Apply Range only when this validator matches the current audio ETag.
      schema:
        type: string
      example: '"0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"'
  headers:
    XAPIVersion:
      description: Stable API namespace served by this process.
      schema:
        type: string
        const: v1
    XRequestID:
      description: Caller-provided or server-generated request correlation ID.
      schema:
        type: string
        minLength: 1
        maxLength: 200
    XServerVersion:
      description: Semantic server build version.
      schema:
        type: string
        minLength: 1
    Location:
      description: Relative URL of the created or completed resource.
      schema:
        type: string
    ETag:
      description: Quoted resource version or lowercase SHA-256 entity tag.
      schema:
        type: string
    IdempotencyReplayed:
      description: Present with value `true` when an earlier result is replayed.
      schema:
        type: string
        const: 'true'
    SetCookie:
      description: HttpOnly VoiceAsset session cookie.
      schema:
        type: string
    WWWAuthenticate:
      description: Bearer authentication challenge.
      schema:
        type: string
        const: 'Bearer realm="voiceasset"'
    RateLimitLimit:
      description: Login-attempt limit in the current window.
      schema:
        type: integer
        const: 5
    RateLimitRemaining:
      description: Remaining login attempts in the current window.
      schema:
        type: integer
        minimum: 0
        maximum: 5
    RetryAfter:
      description: Seconds before another login attempt is allowed.
      schema:
        type: integer
        minimum: 1
    AcceptRanges:
      description: Supported range unit.
      schema:
        type: string
        const: bytes
    ContentRange:
      description: Byte interval and complete representation length.
      schema:
        type: string
    ContentLength:
      description: Number of bytes in the selected representation.
      schema:
        type: integer
        format: int64
        minimum: 0
    ContentDisposition:
      description: Safe server-generated attachment filename.
      schema:
        type: string
  responses:
    HealthResponse:
      description: The process can serve the requested health probe.
      headers:
        X-API-Version:
          $ref: '#/components/headers/XAPIVersion'
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
        X-Server-Version:
          $ref: '#/components/headers/XServerVersion'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Health'
          example:
            status: ok
            service: VoiceAsset
            timestamp: '2026-07-16T06:00:00Z'
    CapabilitiesResponse:
      description: Implemented capabilities and version identifiers.
      headers:
        X-API-Version:
          $ref: '#/components/headers/XAPIVersion'
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
        X-Server-Version:
          $ref: '#/components/headers/XServerVersion'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Capabilities'
          example:
            server_version: 0.1.0-dev
