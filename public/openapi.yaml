          $ref: '#/components/schemas/HotwordProviderMapping'
        enabled:
          type: boolean
          default: true
        description:
          type: string
          maxLength: 500
    HotwordEntry:
      type: object
      additionalProperties: false
      required: [term, aliases, language, weight, provider_mapping, enabled]
      properties:
        term:
          $ref: '#/components/schemas/HotwordTerm'
        aliases:
          type: array
          maxItems: 20
          uniqueItems: true
          items:
            $ref: '#/components/schemas/HotwordTerm'
        language:
          type: string
          pattern: '^[A-Za-z]{2,8}(?:-[A-Za-z0-9]{1,8})*$'
        weight:
          type: integer
          minimum: 1
          maximum: 100
        provider_mapping:
          $ref: '#/components/schemas/HotwordProviderMapping'
        enabled:
          type: boolean
        description:
