          minimum: 0
          maximum: 1
        context_limit:
          type: integer
          minimum: 1000
          maximum: 1000000
        structured_output:
          type: boolean
          const: true
        prompt_template:
          type: string
          minLength: 1
          maxLength: 8000
        default_glossary_id:
          type: string
          format: uuid
        auto_approval_policy:
          type: string
