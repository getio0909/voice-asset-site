      properties:
        access_token:
          type: string
          minLength: 8
          maxLength: 4096
          writeOnly: true
        access_key_id:
          type: string
          minLength: 8
          maxLength: 4096
          writeOnly: true
        access_key_secret:
          type: string
          minLength: 8
          maxLength: 4096
          writeOnly: true
