      type: object
      additionalProperties: false
      required: [secret_id, secret_key]
      properties:
        secret_id:
          type: string
          minLength: 8
          maxLength: 4096
          writeOnly: true
        secret_key:
          type: string
          minLength: 8
          maxLength: 4096
          writeOnly: true
