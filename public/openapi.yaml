          maxItems: 50
          uniqueItems: true
          items:
            type: string
            minLength: 1
            maxLength: 200
        forbidden_contexts:
          type: array
          maxItems: 50
          uniqueItems: true
          items:
            type: string
            minLength: 1
            maxLength: 200
        regex:
          type: boolean
          default: false
        case_sensitive:
          type: boolean
          default: false
        priority:
          type: integer
          minimum: 1
          maximum: 1000
        description:
          type: string
          maxLength: 500
    GlossarySet:
      type: object
      additionalProperties: false
      required:
        - id
        - workspace_id
        - display_name
        - scope_type
        - scope_id
        - state
        - current_version
        - resource_version
        - entries
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        display_name:
          type: string
        scope_type:
          $ref: '#/components/schemas/HotwordScopeType'
        scope_id:
          type: [string, 'null']
          format: uuid
        state:
          type: string
          enum: [enabled, disabled]
        current_version:
          type: integer
          minimum: 1
        resource_version:
          type: integer
          format: int64
          minimum: 1
        entries:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: '#/components/schemas/GlossaryEntry'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    GlossarySetList:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/GlossarySet'
    GlossarySnapshot:
      type: object
      additionalProperties: false
      properties:
        sets:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [id, version, scope_type]
            properties:
              id:
                type: string
                format: uuid
              version:
                type: integer
                minimum: 1
