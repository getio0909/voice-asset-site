openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: VoiceAsset Server API
  version: 0.22.0
  summary: Public REST contract for the VoiceAsset modular monolith.
  description: >-
    VoiceAsset provides local web sessions, immutable audio ingestion, durable
    transcription jobs, encrypted workspace-scoped ASR provider profiles,
    transcript retrieval, authenticated byte-range audio delivery, and bounded
    asynchronous waveform derivatives. Resource access is always scoped to the
    authenticated workspace.
  license:
    name: GNU Affero General Public License v3.0 or later
    identifier: AGPL-3.0-or-later
servers:
  - url: /
    description: Server hosting this contract
tags:
  - name: System
    description: Process health and server capability discovery.
  - name: Authentication
    description: Local web-session lifecycle.
  - name: API Keys
    description: Workspace-scoped, least-privilege credentials for Agents and integrations.
  - name: Administration
    description: Owner/Admin operational status, durable jobs, and immutable audit reads.
  - name: Assets
    description: Workspace-scoped voice asset records.
  - name: Sync
    description: Incremental workspace change feeds for offline clients.
  - name: Notifications
    description: Personal, immutable task events for interactive user sessions.
  - name: Realtime
    description: Authenticated WebSocket transcription sessions with resumable audio frames.
  - name: Organization
    description: Workspace collections, tags, annotations, and processing read models.
  - name: Uploads
    description: Resumable, checksum-verified WAV and Android M4A ingestion.
  - name: Transcriptions
    description: Durable asynchronous transcription jobs.
  - name: Transcripts
    description: Immutable transcript revisions and timelines.
  - name: Audio
    description: Authenticated original-audio delivery.
  - name: Providers
    description: Workspace-scoped ASR provider configuration and routing.
  - name: Hotwords
    description: Versioned provider-neutral ASR recognition hints.
  - name: Corrections
    description: Durable LLM correction, append-only review, and immutable approval.
  - name: Glossaries
    description: Versioned post-ASR correction dictionaries, separate from ASR hotwords.
  - name: LLM Providers
    description: Workspace-scoped encrypted LLM provider configuration.
  - name: Webhooks
    description: Workspace-scoped signed outbound job notifications.
security: []
paths:
  /healthz:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    get:
      tags: [System]
      summary: Get aggregate process health
      operationId: getHealth
      responses:
        '200':
          $ref: '#/components/responses/HealthResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
  /livez:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    get:
      tags: [System]
      summary: Check whether the API process is alive
      operationId: getLiveness
      responses:
        '200':
          $ref: '#/components/responses/HealthResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
  /readyz:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    get:
      tags: [System]
      summary: Check whether the API process can serve traffic
      operationId: getReadiness
      responses:
        '200':
          $ref: '#/components/responses/HealthResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
  /api/v1/system/capabilities:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    get:
      tags: [System]
      summary: Negotiate implemented server capabilities
      description: Clients use this response before enabling optional behavior.
      operationId: getSystemCapabilities
      responses:
        '200':
          $ref: '#/components/responses/CapabilitiesResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
  /api/v1/admin/jobs:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    get:
      tags: [Administration]
      summary: List durable workspace jobs
      description: >-
        Requires `admin:read`. Results are workspace-scoped and ordered by
        update time then identifier, both descending. The opaque cursor is
        bound to the workspace and complete state/kind filter set. Job payload,
        idempotency material, and worker identifiers are never returned.
      operationId: listAdminJobs
      security:
        - SessionCookie: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OperationsListLimit'
        - $ref: '#/components/parameters/ListCursor'
        - $ref: '#/components/parameters/JobStateFilter'
        - $ref: '#/components/parameters/JobKindFilter'
      responses:
        '200':
          $ref: '#/components/responses/OperationsJobListResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/v1/admin/jobs/{job_id}/retry:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
      - $ref: '#/components/parameters/JobID'
    post:
      tags: [Administration]
      summary: Retry one failed durable workspace job
      description: >-
        Requires `admin:write`. Only a failed, result-free supported job whose
        asset remains in the required lifecycle state can be retried. Each
        successful request grants exactly one additional attempt, preserves
        attempt history, and atomically records an audit entry. The hard limit
        is 20 attempts.
      operationId: retryAdminJob
      security:
        - SessionCookie: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Origin'
      responses:
        '200':
          $ref: '#/components/responses/OperationsJobResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/v1/admin/audit-logs:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    get:
      tags: [Administration]
      summary: List immutable workspace audit records
      description: >-
        Requires `admin:read`. Results are workspace-scoped and ordered by
        occurrence time then identifier, both descending. The opaque cursor is
        bound to the workspace and complete actor/action/target filter set.
        This read is itself audited and appears on a subsequent page refresh.
      operationId: listAdminAuditLogs
      security:
        - SessionCookie: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OperationsListLimit'
        - $ref: '#/components/parameters/ListCursor'
        - $ref: '#/components/parameters/AuditActorTypeFilter'
        - $ref: '#/components/parameters/AuditActionFilter'
        - $ref: '#/components/parameters/AuditTargetTypeFilter'
      responses:
        '200':
          $ref: '#/components/responses/OperationsAuditListResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/v1/admin/system-settings:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    get:
      tags: [Administration]
      summary: Read safe deployment settings
      description: >-
        Requires `admin:read`. Returns an allowlisted, read-only projection of
        deployment runtime configuration. Workspace principals cannot mutate
        deployment settings, and this operation never exposes database URLs,
        filesystem paths, object-store endpoints, credentials, tokens, or the
        deployment-global `system_settings` table.
      operationId: getAdminSystemSettings
      security:
        - SessionCookie: []
        - BearerAuth: []
      responses:
        '200':
          $ref: '#/components/responses/DeploymentSystemSettingsResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/v1/admin/system-status:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    get:
      tags: [Administration]
      summary: Get a workspace operational snapshot
      description: >-
        Requires `admin:read`. Returns database-derived asset, storage,
        transcript, job, provider, and active-user counts for the authenticated
        workspace. It does not expose filesystem paths, credentials, or global
        data from other workspaces.
      operationId: getAdminSystemStatus
      security:
        - SessionCookie: []
        - BearerAuth: []
      responses:
        '200':
          $ref: '#/components/responses/OperationsSystemStatusResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/v1/admin/workspace:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    get:
      tags: [Administration]
      summary: Get the authenticated workspace profile
      description: >-
        Requires `admin:read`. Returns only the workspace selected by the
        authenticated principal. The read is audited and the current resource
        version is returned as a strong ETag.
      operationId: getAdminWorkspace
      security:
        - SessionCookie: []
        - BearerAuth: []
      responses:
        '200':
          $ref: '#/components/responses/WorkspaceResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
    patch:
      tags: [Administration]
      summary: Rename the authenticated workspace
      description: >-
        Requires the Owner role and `admin:write`. Uses an exact version ETag
        for optimistic concurrency. A changed name increments the version and
        writes an audit record atomically; an unchanged normalized name is a
        no-op that retains the current version.
      operationId: updateAdminWorkspace
      security:
        - SessionCookie: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/WorkspaceIfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkspaceRequest'
      responses:
        '200':
          $ref: '#/components/responses/WorkspaceResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '412':
          $ref: '#/components/responses/WorkspaceVersionConflictResponse'
        '413':
          $ref: '#/components/responses/RequestTooLargeResponse'
        '428':
          $ref: '#/components/responses/PreconditionRequiredResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/v1/admin/members:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    get:
      tags: [Administration]
      summary: List workspace members
      description: >-
        Requires `admin:read`. Results are workspace-scoped and ordered by
        update time then user identifier, both descending. The opaque cursor is
        bound to the workspace and complete role/status filter set. Password
        hashes and credentials are never returned. This read is audited.
      operationId: listAdminMembers
      security:
        - SessionCookie: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OperationsListLimit'
        - $ref: '#/components/parameters/ListCursor'
        - $ref: '#/components/parameters/MemberRoleFilter'
        - $ref: '#/components/parameters/MemberStatusFilter'
      responses:
        '200':
          $ref: '#/components/responses/MembershipListResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
    post:
      tags: [Administration]
      summary: Create a workspace member
      description: >-
        Requires the Owner role and `admin:write`. Creates a local user and an
        active membership atomically. The supplied password is hashed and is
        never returned or recorded in audit metadata.
      operationId: createAdminMember
      security:
        - SessionCookie: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Origin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMemberRequest'
      responses:
        '201':
          $ref: '#/components/responses/MembershipCreatedResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '413':
          $ref: '#/components/responses/RequestTooLargeResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/v1/admin/members/{member_id}:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
      - $ref: '#/components/parameters/MemberID'
    patch:
      tags: [Administration]
      summary: Change a workspace member role or status
      description: >-
        Requires the Owner role and `admin:write`. Uses optimistic concurrency,
        prevents demoting or disabling the last active Owner, and revokes all
        sessions and API keys when a membership is disabled.
      operationId: updateAdminMember
      security:
        - SessionCookie: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/MembershipIfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMemberRequest'
      responses:
        '200':
          $ref: '#/components/responses/MembershipResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '412':
          $ref: '#/components/responses/MembershipVersionConflictResponse'
        '413':
          $ref: '#/components/responses/RequestTooLargeResponse'
        '428':
          $ref: '#/components/responses/PreconditionRequiredResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/v1/admin/webhooks:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    get:
      tags: [Webhooks]
      summary: List signed outbound Webhook endpoints
      description: >-
        Requires an Owner browser Session and `admin:read`. Secrets are never
        returned; the response exposes only whether one is configured.
      operationId: listAdminWebhooks
      security:
        - SessionCookie: []
      responses:
        '200':
          $ref: '#/components/responses/WebhookListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
    post:
      tags: [Webhooks]
      summary: Create a signed outbound Webhook endpoint
      description: >-
        Requires an Owner browser Session and `admin:write`. The signing
        secret is returned once and cannot be retrieved later. Endpoint URLs
        must pass the Server public-HTTPS and SSRF policy.
      operationId: createAdminWebhook
      security:
        - SessionCookie: []
      parameters:
        - $ref: '#/components/parameters/Origin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWebhookRequest'
      responses:
        '201':
          $ref: '#/components/responses/WebhookCreatedResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '413':
          $ref: '#/components/responses/RequestTooLargeResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/v1/admin/webhooks/{webhook_id}:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
      - $ref: '#/components/parameters/WebhookID'
    patch:
      tags: [Webhooks]
      summary: Update a signed outbound Webhook endpoint
      description: >-
        Requires an Owner browser Session and `admin:write`. The exact
        resource version in `If-Match` prevents lost updates; unfinished
        deliveries for the previous version are cancelled.
      operationId: updateAdminWebhook
      security:
        - SessionCookie: []
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/WebhookIfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWebhookRequest'
      responses:
        '200':
          $ref: '#/components/responses/WebhookResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '413':
          $ref: '#/components/responses/RequestTooLargeResponse'
        '428':
          $ref: '#/components/responses/PreconditionRequiredResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/v1/admin/webhooks/{webhook_id}/rotate-secret:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
      - $ref: '#/components/parameters/WebhookID'
    post:
      tags: [Webhooks]
      summary: Rotate a Webhook signing secret
      description: >-
        Requires an Owner browser Session and `admin:write`. The new secret is
        returned once and all unfinished deliveries for the old endpoint
        version are cancelled.
      operationId: rotateAdminWebhookSecret
      security:
        - SessionCookie: []
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/WebhookIfMatch'
      responses:
        '200':
          $ref: '#/components/responses/WebhookSecretResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '428':
          $ref: '#/components/responses/PreconditionRequiredResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/v1/admin/webhooks/{webhook_id}/test:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
      - $ref: '#/components/parameters/WebhookID'
    post:
      tags: [Webhooks]
      summary: Queue a signed Webhook test delivery
      description: Requires an enabled Webhook and an Owner browser Session.
      operationId: testAdminWebhook
      security:
        - SessionCookie: []
      parameters:
        - $ref: '#/components/parameters/Origin'
      responses:
        '202':
          $ref: '#/components/responses/WebhookDeliveryResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/v1/admin/webhooks/{webhook_id}/deliveries:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
      - $ref: '#/components/parameters/WebhookID'
    get:
      tags: [Webhooks]
      summary: List bounded Webhook delivery state
      description: >-
        Requires an Owner browser Session and `admin:read`. Response bodies
        are never returned; only state, attempts, status, and safe error class
        are exposed.
      operationId: listAdminWebhookDeliveries
      security:
        - SessionCookie: []
      parameters:
        - $ref: '#/components/parameters/WebhookDeliveryLimit'
      responses:
        '200':
          $ref: '#/components/responses/WebhookDeliveryListResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/v1/auth/sessions:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    post:
      tags: [Authentication]
      summary: Create a local web session
      description: >-
        Validates local credentials and sets `voiceasset_session` as an
        HttpOnly, SameSite=Strict cookie scoped to `/api/v1`. The opaque access
        token is never returned in the JSON body. If Origin is present, it must
        equal the configured public origin. Attempts are limited to five per
        client IP per minute.
      operationId: createWebSession
      parameters:
        - $ref: '#/components/parameters/Origin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '201':
          $ref: '#/components/responses/WebSessionCreatedResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/InvalidCredentialsResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '413':
          $ref: '#/components/responses/RequestTooLargeResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/v1/auth/session:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    get:
      tags: [Authentication]
      summary: Get the current web session
      operationId: getWebSession
      security:
        - SessionCookie: []
        - BearerAuth: []
      responses:
        '200':
          $ref: '#/components/responses/CurrentSessionResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
    delete:
      tags: [Authentication]
      summary: Revoke the current web session
      description: >-
        Cookie-authenticated requests must send Origin equal to the configured
        public origin. Bearer-authenticated requests do not require Origin.
      operationId: deleteWebSession
      security:
        - SessionCookie: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Origin'
      responses:
        '204':
          $ref: '#/components/responses/SessionDeletedResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/v1/auth/session/refresh:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    post:
      tags: [Authentication]
      summary: Rotate the current web-session credentials
      description: >-
        Requires the HttpOnly `voiceasset_refresh` cookie and Origin equal to
        the configured public origin. Rotation atomically invalidates the old
        access and refresh tokens, preserves the device-session family, and
        returns replacement cookies without exposing either token in JSON.
      operationId: refreshWebSession
      security:
        - RefreshCookie: []
      parameters:
        - $ref: '#/components/parameters/Origin'
      responses:
        '200':
          $ref: '#/components/responses/WebSessionRefreshedResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/v1/auth/password:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    patch:
      tags: [Authentication]
      summary: Change the current user's local password
      description: >-
        Requires an authenticated access session; API keys are rejected. The
        current password is verified before the replacement is hashed. The
        password update, revocation of every existing session for the user,
        and a credential-free audit record commit atomically. Both browser
        cookies are expired on success, so the user must sign in again.
        Cookie-authenticated requests must send the configured Origin.
        Attempts are limited to five per user and client IP per minute.
      operationId: changeAccountPassword
      security:
        - SessionCookie: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Origin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          $ref: '#/components/responses/PasswordChangedResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/InvalidCredentialsResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '413':
          $ref: '#/components/responses/RequestTooLargeResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/v1/auth/device-sessions:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    get:
      tags: [Authentication]
      summary: List the current user's active device sessions
      description: >-
        Requires an access session. API keys cannot enumerate personal device
        sessions. Results are scoped to the authenticated user and workspace;
        expired and revoked sessions are omitted.
      operationId: listDeviceSessions
      security:
        - SessionCookie: []
        - BearerAuth: []
      responses:
        '200':
          $ref: '#/components/responses/DeviceSessionListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/v1/auth/device-sessions/{device_session_id}:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
      - $ref: '#/components/parameters/DeviceSessionID'
    delete:
      tags: [Authentication]
      summary: Revoke one of the current user's device sessions
      description: >-
        Requires an access session and the configured Origin for cookie
        authentication. The target is user- and workspace-scoped. Revoking the
        current session also expires both browser cookies.
      operationId: revokeDeviceSession
      security:
        - SessionCookie: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Origin'
      responses:
        '204':
          $ref: '#/components/responses/DeviceSessionDeletedResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/v1/auth/pairing-sessions:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    post:
      tags: [Authentication]
      summary: Create a one-time device-pairing payload
      description: >-
        Requires a personal access session; API keys are rejected. Creating a
        payload revokes every older unclaimed payload for the same user and
        workspace. The response contains one five-minute bearer capability
        exactly once and must not be persisted or logged. Cookie-authenticated
        requests must send Origin equal to the configured public origin.
      operationId: createPairingSession
      security:
        - SessionCookie: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Origin'
      responses:
        '201':
          $ref: '#/components/responses/PairingSessionCreatedResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/v1/auth/pairing-sessions/{pairing_session_id}/claim:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
      - $ref: '#/components/parameters/PairingSessionID'
    post:
      tags: [Authentication]
      summary: Exchange a one-time pairing capability for a device session
      description: >-
        The caller must use the exact HTTPS origin encoded in the pairing
        payload and submit its identifier and secret before expiry. A successful
        claim atomically consumes the capability, creates a named device session,
        and returns opaque access and refresh credentials only in HttpOnly
        SameSite=Strict cookies. Invalid, expired, revoked, and replayed payloads
        share one generic response. Attempts are limited to five per client IP
        per minute.
      operationId: claimPairingSession
      security: []
      parameters:
        - $ref: '#/components/parameters/RequiredOrigin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PairingClaimRequest'
      responses:
        '201':
          $ref: '#/components/responses/PairingSessionClaimedResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/InvalidPairingResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '413':
          $ref: '#/components/responses/RequestTooLargeResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/v1/api-keys:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    get:
      tags: [API Keys]
      summary: List workspace API keys
      description: >-
        Requires `admin:read`. The one-time plaintext token is never returned;
        only its non-secret display prefix and lifecycle metadata are listed.
        Successful reads are recorded in the immutable audit log.
      operationId: listAPIKeys
      security:
        - SessionCookie: []
        - BearerAuth: []
      responses:
        '200':
          $ref: '#/components/responses/APIKeyListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
    post:
      tags: [API Keys]
      summary: Create a scoped API key
      description: >-
        Requires `admin:write`. Requested scopes must be a subset of the
        caller's effective scopes. The plaintext `va_pat_` token is returned
        exactly once and expires between five minutes and 365 days after
        creation. Cookie-authenticated requests must send the configured Origin.
      operationId: createAPIKey
      security:
        - SessionCookie: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Origin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAPIKeyRequest'
      responses:
        '201':
          $ref: '#/components/responses/APIKeyCreatedResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '413':
          $ref: '#/components/responses/RequestTooLargeResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/v1/api-keys/{api_key_id}:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
      - $ref: '#/components/parameters/APIKeyID'
    delete:
      tags: [API Keys]
      summary: Revoke an API key
      description: >-
        Requires `admin:write`. Revocation is idempotent within the current
        workspace; credentials from another workspace are returned as 404.
        Cookie-authenticated requests must send the configured Origin.
      operationId: revokeAPIKey
      security:
        - SessionCookie: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Origin'
      responses:
        '200':
          $ref: '#/components/responses/APIKeyResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/v1/assets:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    get:
      tags: [Assets]
      summary: List or search voice assets
      description: >-
        Requires `assets:read`. Results are workspace-scoped and ordered by
        immutable creation time, then identifier, both descending. The opaque
        cursor must be reused with the same complete filter set. Trashed assets
        are excluded unless `status=trashed` is requested explicitly.
      operationId: listAssets
      security:
        - SessionCookie: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AssetSearchQuery'
        - $ref: '#/components/parameters/AssetCollectionFilter'
        - $ref: '#/components/parameters/AssetTagFilter'
        - $ref: '#/components/parameters/AssetStatusFilter'
        - $ref: '#/components/parameters/AssetProviderFilter'
        - $ref: '#/components/parameters/AssetSpeakerFilter'
        - $ref: '#/components/parameters/AssetCreatedFrom'
        - $ref: '#/components/parameters/AssetCreatedBefore'
        - $ref: '#/components/parameters/ListLimit'
        - $ref: '#/components/parameters/ListCursor'
      responses:
        '200':
          $ref: '#/components/responses/AssetListResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
    post:
      tags: [Assets]
      summary: Create a draft voice asset
      description: >-
        Requires `assets:write`. Reusing an Idempotency-Key with the same
        normalized input returns the original asset and
        `Idempotency-Replayed: true`; different input returns 409. A
        cookie-authenticated request must send the configured Origin.
      operationId: createAsset
      security:
        - SessionCookie: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/Origin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAssetRequest'
      responses:
        '200':
          $ref: '#/components/responses/AssetReplayResponse'
        '201':
          $ref: '#/components/responses/AssetCreatedResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '413':
          $ref: '#/components/responses/RequestTooLargeResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/v1/sync/changes:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    get:
      tags: [Sync]
      summary: List incremental asset changes
      description: >-
        Requires `assets:read`. Results are workspace-scoped and strictly
        ordered by an append-only sequence. Upserts include the non-secret asset
        snapshot captured in the same transaction as the mutation; permanent
        deletions retain only the identifier and final version. The opaque
        cursor is bound to the authenticated workspace and is always returned,
        including for an empty page. Clients must persist it only after applying
        the complete page locally.
      operationId: listSyncChanges
      security:
        - SessionCookie: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SyncListLimit'
        - $ref: '#/components/parameters/ListCursor'
      responses:
        '200':
          $ref: '#/components/responses/SyncChangeListResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/v1/events:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    get:
      tags: [Notifications]
      summary: List personal task events
      description: >-
        Requires an interactive Session with `transcripts:read`. API keys are
        rejected. Results contain only terminal task state, safe error codes,
        and optional asset/revision references; job payloads, credentials,
        idempotency material, and worker data are never returned. Events are
        generated in the same transaction as each terminal job transition and
        strictly ordered by an append-only sequence. The opaque cursor is bound
        to both the authenticated workspace and user and is always returned,
        including for an empty page.
      operationId: listPersonalEvents
      security:
        - SessionCookie: []
      parameters:
        - $ref: '#/components/parameters/NotificationListLimit'
        - $ref: '#/components/parameters/ListCursor'
      responses:
        '200':
          $ref: '#/components/responses/NotificationListResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/v1/realtime/transcriptions:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    get:
      tags: [Realtime]
      summary: Open a realtime transcription WebSocket
      description: >-
        Upgrades to a WebSocket using subprotocol `voiceasset.realtime.v1`.
        Requires `transcriptions:write` and either the interactive Session
        cookie or a bearer credential. Cookie-authenticated upgrades must send
        the configured Origin. Text messages follow
        `contracts/realtime-events.schema.json`; binary frames are rejected.
        The server retains a bounded reconnect window after disconnect and
        accepts `start` or `resume` as the first message.
      operationId: openRealtimeTranscription
      security:
        - SessionCookie: []
        - BearerAuth: []
      x-websocket: true
      responses:
        '200':
          description: >-
            Reserved compatibility response for intermediaries that do not
            perform the WebSocket upgrade; no realtime stream is established.
        '101':
          description: Switching Protocols; the realtime event stream is open.
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/v1/assets/{asset_id}:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
      - $ref: '#/components/parameters/AssetID'
    get:
      tags: [Assets]
      summary: Get a voice asset
      description: Requires `assets:read`; an asset in another workspace is returned as 404.
      operationId: getAsset
      security:
        - SessionCookie: []
        - BearerAuth: []
      responses:
        '200':
          $ref: '#/components/responses/AssetResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
    delete:
      tags: [Assets]
      summary: Move a voice asset to trash
      description: >-
        Requires `assets:write` and the exact resource-version ETag. The asset,
        immutable audio, transcripts, and metadata remain stored; normal reads
        hide the asset until it is restored. Successful changes are
        transactionally audited. Cookie authentication requires Origin.
      operationId: trashAsset
      security:
        - SessionCookie: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/AssetIfMatch'
      responses:
        '200':
          $ref: '#/components/responses/AssetResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '428':
          $ref: '#/components/responses/PreconditionRequiredResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/v1/assets/{asset_id}/metadata:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
      - $ref: '#/components/parameters/AssetID'
    put:
      tags: [Assets]
      summary: Replace mutable asset metadata
      description: >-
        Requires `metadata:write` and the exact resource-version ETag. Title,
        language, and collection_id form a full replacement; collection_id may
        be null. An asset or collection in another workspace is returned as
        404. Successful updates are transactionally audited.
      operationId: updateAssetMetadata
      security:
        - SessionCookie: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/AssetIfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAssetMetadataRequest'
      responses:
        '200':
          $ref: '#/components/responses/AssetResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '413':
          $ref: '#/components/responses/RequestTooLargeResponse'
        '428':
          $ref: '#/components/responses/PreconditionRequiredResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/v1/assets/{asset_id}/restore:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
      - $ref: '#/components/parameters/AssetID'
    post:
      tags: [Assets]
      summary: Restore a voice asset from trash
      description: >-
        Requires `assets:write` and the exact trashed resource-version ETag.
        Restores the status held immediately before trashing, or `draft` for a
        legacy trashed record. Successful changes are transactionally audited.
        Cookie authentication requires Origin.
      operationId: restoreAsset
      security:
        - SessionCookie: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/AssetIfMatch'
      responses:
        '200':
          $ref: '#/components/responses/AssetResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowedResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '428':
          $ref: '#/components/responses/PreconditionRequiredResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/v1/assets/{asset_id}/purge:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
      - $ref: '#/components/parameters/AssetID'
    post:
      tags: [Assets]
      summary: Permanently delete a trashed voice asset
      description: >-
        Requires an Owner with `assets:write`, the exact asset ETag, a unique
        idempotency key, and a body that repeats the asset identifier. The asset
        must already be trashed and have no active jobs. The accepted background
        job verifies and deletes every immutable object and upload part before
        removing relational data; immutable purge audits remain. A failed
        terminal job may be resumed with the returned asset_version and a new
        idempotency key. Cookie authentication requires Origin.
      operationId: purgeAsset
      security:
        - SessionCookie: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/AssetIfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PurgeAssetRequest'
      responses:
        '200':
          $ref: '#/components/responses/AssetPurgeReplayResponse'
        '202':
          $ref: '#/components/responses/AssetPurgeAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '405':
