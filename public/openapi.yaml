    ApprovalResponse:
      description: Human-reviewed and approved immutable child revisions.
      headers:
        Location:
          $ref: '#/components/headers/Location'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApprovalResult'
  schemas:
    Workspace:
      type: object
      additionalProperties: false
      required: [id, name, version, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 200
        version:
          type: integer
          format: int64
          minimum: 1
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    UpdateWorkspaceRequest:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: Leading and trailing whitespace is removed; control characters are rejected.
    MembershipList:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/Member'
        next_cursor:
          type: string
          minLength: 1
          maxLength: 1024
    Member:
      type: object
      additionalProperties: false
      required: [id, workspace_id, email, role, status, version, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
          minLength: 3
          maxLength: 254
        role:
          $ref: '#/components/schemas/MemberRole'
        status:
          $ref: '#/components/schemas/MemberStatus'
        version:
          type: integer
          format: int64
          minimum: 1
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    MemberRole:
      type: string
      enum: [owner, admin, editor, viewer, agent]
    MemberStatus:
      type: string
      enum: [active, disabled]
    CreateMemberRequest:
      type: object
      additionalProperties: false
      required: [email, password, role]
      properties:
        email:
          type: string
          format: email
          minLength: 3
          maxLength: 254
        password:
          type: string
          minLength: 12
          maxLength: 1024
          writeOnly: true
        role:
          $ref: '#/components/schemas/MemberRole'
    UpdateMemberRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        role:
          $ref: '#/components/schemas/MemberRole'
        status:
          $ref: '#/components/schemas/MemberStatus'
    OperationsJobList:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/OperationsJob'
        next_cursor:
          type: string
          minLength: 1
          maxLength: 1024
    OperationsJob:
      type: object
      additionalProperties: false
      required:
        - id
        - created_by
        - kind
        - state
        - attempts
        - max_attempts
        - retryable
        - available_at
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        asset_id:
          type: string
          format: uuid
        created_by:
          type: string
          format: uuid
        kind:
          type: string
          pattern: '^[a-z][a-z0-9_]{0,99}$'
        state:
          type: string
          enum: [queued, running, retry_wait, succeeded, failed, cancelled]
        attempts:
          type: integer
          minimum: 0
        max_attempts:
          type: integer
          minimum: 1
          maximum: 20
        retryable:
          type: boolean
          description: >-
            True only when this exact failed job is currently eligible for one
            audited manual retry.
        available_at:
          type: string
          format: date-time
        lease_expires_at:
          type: string
          format: date-time
        last_error_code:
          type: string
          pattern: '^[a-z][a-z0-9_]{0,99}$'
        result_revision_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    OperationsAuditList:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/OperationsAuditEntry'
        next_cursor:
          type: string
          minLength: 1
          maxLength: 1024
    OperationsAuditEntry:
      type: object
      additionalProperties: false
      required: [id, actor_type, action, target_type, metadata, occurred_at]
      properties:
        id:
          type: string
          format: uuid
        actor_id:
          type: string
          format: uuid
        actor_email:
          type: string
          format: email
        actor_type:
          type: string
          enum: [user, agent, system]
        action:
          type: string
          pattern: '^[a-z][a-z0-9_.]{0,99}$'
        target_type:
          type: string
          pattern: '^[a-z][a-z0-9_.]{0,99}$'
        target_id:
          type: string
          format: uuid
        request_id:
          type: string
          minLength: 1
          maxLength: 200
        metadata:
          type: object
          additionalProperties: true
        occurred_at:
          type: string
          format: date-time
    OperationsSystemStatus:
      type: object
      additionalProperties: false
      required: [generated_at, active_users, assets, storage, transcripts, jobs, providers]
      properties:
        generated_at:
          type: string
          format: date-time
        active_users:
          type: integer
          format: int64
          minimum: 0
        assets:
          $ref: '#/components/schemas/OperationsAssetStatus'
        storage:
          $ref: '#/components/schemas/OperationsStorageStatus'
        transcripts:
          $ref: '#/components/schemas/OperationsTranscriptStatus'
        jobs:
          $ref: '#/components/schemas/OperationsJobStatus'
        providers:
          $ref: '#/components/schemas/OperationsProviderStatus'
    DeploymentSystemSettings:
      type: object
      additionalProperties: false
      required:
        - scope
        - management
        - mutable
        - brand_name
        - public_origin
        - storage_backend
        - cookie_secure
        - provider_credential_encryption_configured
      properties:
        scope:
          type: string
          const: deployment
        management:
          type: string
          const: operator_environment
        mutable:
          type: boolean
          const: false
          description: Workspace-authenticated API clients cannot mutate deployment settings.
        brand_name:
          type: string
          minLength: 1
        public_origin:
          type: string
          format: uri
          pattern: '^https?://[^/]+$'
        storage_backend:
          type: string
          enum: [local, s3]
        cookie_secure:
          type: boolean
        provider_credential_encryption_configured:
          type: boolean
          description: Reports only whether the provider credential envelope is configured.
    OperationsAssetStatus:
      type: object
      additionalProperties: false
      required: [total, active, trashed, purging, failed, audio_duration_ms]
      properties:
        total: { type: integer, format: int64, minimum: 0 }
        active: { type: integer, format: int64, minimum: 0 }
        trashed: { type: integer, format: int64, minimum: 0 }
        purging: { type: integer, format: int64, minimum: 0 }
        failed: { type: integer, format: int64, minimum: 0 }
        audio_duration_ms: { type: integer, format: int64, minimum: 0 }
    OperationsStorageStatus:
      type: object
      additionalProperties: false
      required: [object_count, bytes]
      properties:
        object_count: { type: integer, format: int64, minimum: 0 }
        bytes: { type: integer, format: int64, minimum: 0 }
    OperationsTranscriptStatus:
      type: object
      additionalProperties: false
      required: [transcript_count, revision_count]
      properties:
        transcript_count: { type: integer, format: int64, minimum: 0 }
        revision_count: { type: integer, format: int64, minimum: 0 }
    OperationsJobStatus:
      type: object
      additionalProperties: false
      required: [total, queued, running, retry_wait, succeeded, failed, cancelled]
      properties:
        total: { type: integer, format: int64, minimum: 0 }
        queued: { type: integer, format: int64, minimum: 0 }
        running: { type: integer, format: int64, minimum: 0 }
        retry_wait: { type: integer, format: int64, minimum: 0 }
        succeeded: { type: integer, format: int64, minimum: 0 }
        failed: { type: integer, format: int64, minimum: 0 }
        cancelled: { type: integer, format: int64, minimum: 0 }
    OperationsProviderStatus:
      type: object
      additionalProperties: false
      required: [enabled_asr, enabled_llm]
      properties:
        enabled_asr: { type: integer, format: int64, minimum: 0 }
        enabled_llm: { type: integer, format: int64, minimum: 0 }
    CreateHotwordSetRequest:
      type: object
      additionalProperties: false
      required: [display_name, scope_type, entries]
      properties:
        display_name:
          type: string
          minLength: 1
          maxLength: 100
        scope_type:
          $ref: '#/components/schemas/HotwordScopeType'
