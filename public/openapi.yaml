        entity_type:
          type: string
          const: asset
        entity_id:
          type: string
          format: uuid
        operation:
          type: string
          enum: [upsert, delete]
        entity_version:
          type: integer
          format: int64
          minimum: 1
        changed_at:
          type: string
          format: date-time
        asset:
          $ref: '#/components/schemas/SyncAssetSnapshot'
      oneOf:
        - properties:
            operation:
              const: upsert
          required: [asset]
        - properties:
            operation:
              const: delete
            asset: false
    SyncChangeList:
      type: object
      additionalProperties: false
      required: [items, next_cursor, has_more]
      properties:
        items:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/SyncChange'
        next_cursor:
          type: string
          minLength: 1
          maxLength: 1024
        has_more:
          type: boolean
    Notification:
      type: object
      additionalProperties: false
      required: [sequence, id, type, job_id, job_kind, state, occurred_at]
      properties:
        sequence:
          type: integer
          format: int64
          minimum: 1
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [job.succeeded, job.failed, job.cancelled]
        job_id:
          type: string
          format: uuid
        job_kind:
          type: string
          pattern: '^[a-z][a-z0-9_]{0,99}$'
        state:
          type: string
          enum: [succeeded, failed, cancelled]
        asset_id:
          type: string
          format: uuid
        result_revision_id:
          type: string
          format: uuid
        error_code:
          type: string
          enum:
            - internal_error
            - provider_unavailable
            - invalid_audio
            - provider_rejected
            - worker_timeout
            - lease_expired
        occurred_at:
          type: string
          format: date-time
    NotificationList:
      type: object
      additionalProperties: false
      required: [items, next_cursor, has_more]
      properties:
        items:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/Notification'
        next_cursor:
          type: string
          minLength: 1
          maxLength: 1024
        has_more:
          type: boolean
    CollectionList:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/Collection'
        next_cursor:
          type: string
          minLength: 1
          maxLength: 1024
    Collection:
      type: object
      additionalProperties: false
      required: [id, workspace_id, name, description, version, asset_count, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 2000
        version:
          type: integer
          format: int64
          minimum: 1
        asset_count:
          type: integer
          format: int64
          minimum: 0
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    TagList:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/Tag'
        next_cursor:
          type: string
          minLength: 1
          maxLength: 1024
    Tag:
      type: object
      additionalProperties: false
      required: [id, workspace_id, name, color, asset_count, created_at]
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 100
        color:
          type: [string, 'null']
          pattern: '^#[0-9A-Fa-f]{6}$'
        asset_count:
          type: integer
          format: int64
          minimum: 0
        created_at:
          type: string
          format: date-time
    TagMutationRequest:
      type: object
      additionalProperties: false
      required: [tag_ids]
      properties:
        tag_ids:
          type: array
          minItems: 1
          maxItems: 100
          uniqueItems: true
          items:
            type: string
            format: uuid
    TagMutationResult:
      type: object
      additionalProperties: false
      required: [asset_id, tag_ids, changed_count]
      properties:
        asset_id:
          type: string
          format: uuid
        tag_ids:
          type: array
          minItems: 1
          maxItems: 100
          uniqueItems: true
          items:
            type: string
            format: uuid
        changed_count:
          type: integer
          minimum: 0
          maximum: 100
    AnnotationList:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/Annotation'
        next_cursor:
          type: string
          minLength: 1
          maxLength: 1024
    CreateAnnotationRequest:
      type: object
      additionalProperties: false
      required: [kind, start_ms, body]
      properties:
        kind:
          type: string
          enum: [bookmark, note]
        start_ms:
          type: integer
          format: int64
          minimum: 0
        end_ms:
          type: [integer, 'null']
          format: int64
          minimum: 0
          description: Exclusive range end; when present it must exceed start_ms.
        body:
          type: string
          maxLength: 4000
          description: Required and non-empty for note annotations.
    Annotation:
      type: object
      additionalProperties: false
      required:
        - id
        - workspace_id
        - asset_id
        - kind
        - start_ms
        - end_ms
        - body
        - version
        - created_by
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        asset_id:
          type: string
          format: uuid
        kind:
          type: string
          enum: [bookmark, note]
        start_ms:
          type: integer
          format: int64
          minimum: 0
        end_ms:
          type: [integer, 'null']
          format: int64
          minimum: 0
          description: Exclusive range end when the annotation spans an interval.
        body:
          type: string
          maxLength: 4000
        version:
          type: integer
          format: int64
          minimum: 1
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ProcessingStatus:
      type: object
      additionalProperties: false
      required: [asset_id, asset_status, active, jobs, updated_at]
      properties:
        asset_id:
          type: string
          format: uuid
        asset_status:
          type: string
          enum: [draft, uploading, processing, ready, failed, trashed]
        active:
          type: boolean
        jobs:
          type: array
          maxItems: 20
          items:
            $ref: '#/components/schemas/ProcessingJob'
        updated_at:
          type: string
          format: date-time
    ProcessingJob:
      type: object
      additionalProperties: false
      required:
        - id
        - kind
        - state
        - attempts
        - max_attempts
        - last_error_code
        - result_revision_id
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
          minLength: 1
          maxLength: 100
        state:
          type: string
          enum: [queued, running, retry_wait, succeeded, failed, cancelled]
        attempts:
          type: integer
          minimum: 0
          maximum: 20
        max_attempts:
          type: integer
          minimum: 1
          maximum: 20
        last_error_code:
          oneOf:
            - $ref: '#/components/schemas/JobErrorCode'
            - type: 'null'
        result_revision_id:
          type: [string, 'null']
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateUploadRequest:
      type: object
      additionalProperties: false
      required: [asset_id, filename, mime_type, size_bytes, sha256]
      properties:
        asset_id:
          type: string
          format: uuid
        filename:
          type: string
          minLength: 1
          maxLength: 255
          pattern: '^[^/\\\u0000-\u001F\u007F]+$'
        mime_type:
          type: string
          enum: [audio/wav, audio/x-wav, audio/mp4]
        size_bytes:
          type: integer
          format: int64
          minimum: 44
          maximum: 536870912
        sha256:
          $ref: '#/components/schemas/SHA256'
    UploadSession:
      type: object
      additionalProperties: false
      required:
        - id
        - asset_id
        - workspace_id
        - filename
        - mime_type
        - expected_size
        - expected_sha256
        - part_size
        - state
        - expires_at
        - created_at
        - updated_at
        - completed_at
        - error_code
        - parts
      properties:
        id:
          type: string
          format: uuid
        asset_id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        filename:
          type: string
          minLength: 1
          maxLength: 255
        mime_type:
          type: string
          enum: [audio/wav, audio/x-wav, audio/mp4]
        expected_size:
          type: integer
          format: int64
          minimum: 44
          maximum: 536870912
        expected_sha256:
          $ref: '#/components/schemas/SHA256'
        part_size:
          type: integer
          const: 5242880
        state:
          type: string
          enum: [active, assembling, completed, cancelled, failed]
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        completed_at:
          type: [string, 'null']
          format: date-time
        error_code:
          oneOf:
            - type: string
              const: invalid_audio
            - type: 'null'
        parts:
          type: [array, 'null']
          description: >-
            Recorded parts, or null on create/complete responses where the
            server does not reload the part collection.
          items:
            $ref: '#/components/schemas/UploadPart'
    UploadPart:
      type: object
      additionalProperties: false
      required: [number, size_bytes, sha256, created_at]
      properties:
        number:
          type: integer
          minimum: 1
          maximum: 10000
        size_bytes:
          type: integer
          format: int64
          minimum: 1
          maximum: 5242880
        sha256:
          $ref: '#/components/schemas/SHA256'
        created_at:
          type: string
          format: date-time
    TranscriptionJob:
      type: object
      additionalProperties: false
      required:
        - id
        - workspace_id
        - asset_id
        - created_by
        - kind
        - state
        - payload
        - attempts
        - max_attempts
        - available_at
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        asset_id:
          type: string
          format: uuid
        created_by:
          type: string
          format: uuid
        kind:
          type: string
          enum: [mock_transcribe, llm_correct, generate_waveform]
        state:
          type: string
          enum: [queued, running, retry_wait, succeeded, failed, cancelled]
        payload:
          oneOf:
            - $ref: '#/components/schemas/TranscriptionJobPayload'
            - $ref: '#/components/schemas/CorrectionJobPayload'
        attempts:
          type: integer
          minimum: 0
          maximum: 3
        max_attempts:
          type: integer
          const: 3
        available_at:
          type: string
          format: date-time
        lease_owner:
          type: string
          minLength: 1
        lease_expires_at:
          type: string
          format: date-time
        last_error_code:
          $ref: '#/components/schemas/JobErrorCode'
        result_revision_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    TranscriptionJobPayload:
      type: object
      additionalProperties: false
      required: [asset_id]
      properties:
        asset_id:
          type: string
          format: uuid
    CorrectionJobPayload:
      type: object
      additionalProperties: false
      required: [source_revision_id]
      properties:
        source_revision_id:
          type: string
          format: uuid
    JobErrorCode:
      type: string
      enum:
        - internal_error
        - provider_unavailable
        - invalid_audio
        - provider_rejected
        - worker_timeout
        - lease_expired
    TranscriptList:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TranscriptSummary'
    TranscriptSummary:
      type: object
      additionalProperties: false
      required:
        - id
        - asset_id
        - language
        - latest_revision_id
        - latest_kind
        - latest_text
        - created_at
        - revision_created_at
      properties:
        id:
          type: string
          format: uuid
        asset_id:
          type: string
          format: uuid
        language:
          $ref: '#/components/schemas/Language'
        latest_revision_id:
          type: string
          format: uuid
        latest_kind:
          type: string
          enum: [raw_asr, normalized, llm_corrected, human_edited, approved]
        latest_text:
          type: string
        created_at:
          type: string
          format: date-time
        revision_created_at:
          type: string
          format: date-time
    TranscriptRevision:
      type: object
      additionalProperties: false
      required:
        - id
        - transcript_id
        - asset_id
        - kind
        - language
        - text
        - provider_snapshot
        - hotword_snapshot
        - glossary_snapshot
        - diff
        - validation_result
        - created_by_type
        - review_status
        - created_at
        - segments
      properties:
        id:
          type: string
          format: uuid
        transcript_id:
          type: string
          format: uuid
        asset_id:
          type: string
          format: uuid
        parent_revision_id:
          type: string
          format: uuid
        kind:
          type: string
          enum: [raw_asr, normalized, llm_corrected, human_edited, approved]
        language:
          $ref: '#/components/schemas/Language'
        text:
          type: string
        provider_snapshot:
          $ref: '#/components/schemas/ProviderSnapshot'
        hotword_snapshot:
          $ref: '#/components/schemas/HotwordSnapshot'
        glossary_snapshot:
          $ref: '#/components/schemas/GlossarySnapshot'
        diff:
          type: object
          additionalProperties: true
        validation_result:
          type: object
          additionalProperties: true
        provider_raw_object_id:
          type: string
          format: uuid
        source_job_id:
          type: string
          format: uuid
        created_by:
          type: string
          format: uuid
        created_by_type:
          type: string
          enum: [user, agent, system]
        model:
          type: string
        prompt_version:
          type: string
        review_status:
          type: string
          enum: [pending, reviewed, approved, rejected]
        created_at:
          type: string
          format: date-time
        segments:
          type: array
          items:
            $ref: '#/components/schemas/TranscriptSegment'
    TranscriptSegment:
      type: object
      additionalProperties: false
      required: [id, ordinal, start_ms, end_ms, speaker, text, confidence, words]
      properties:
        id:
          type: string
          format: uuid
        ordinal:
          type: integer
          minimum: 0
        start_ms:
          type: integer
          format: int64
          minimum: 0
        end_ms:
          type: integer
          format: int64
          minimum: 0
        speaker:
          type: [string, 'null']
        text:
          type: string
        confidence:
          type: [number, 'null']
          minimum: 0
          maximum: 1
        words:
          type: array
          items:
            $ref: '#/components/schemas/TranscriptWord'
    TranscriptWord:
      type: object
      additionalProperties: true
      required: [start_ms, end_ms, text, confidence]
      properties:
        start_ms:
          type: integer
          format: int64
          minimum: 0
        end_ms:
          type: integer
          format: int64
          minimum: 0
        text:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
    ProviderSnapshot:
      type: object
      additionalProperties: false
      required: [provider_id]
      properties:
        provider_id:
          type: string
          enum: [mock_asr, aliyun_asr, tencent_asr, mock_llm, openai_compatible_llm]
        profile_id:
          type: string
          maxLength: 256
        raw_schema:
          type: string
          enum: [voiceasset.normalized.v1, aliyun.flash.v1, tencent.flash.v1]
        version:
          type: string
          const: '1'
        model:
          type: string
        structured_output:
          type: boolean
        temperature:
          type: number
          minimum: 0
          maximum: 1
        context_limit:
          type: integer
          minimum: 1
        prompt_version:
          type: string
    HotwordSnapshot:
      type: object
      additionalProperties: false
      description: Exact enabled set versions resolved when the ASR job ran; legacy revisions may be empty.
      properties:
        sets:
          type: array
          maxItems: 1000
          items:
            type: object
            additionalProperties: false
            required: [id, version, scope_type]
            properties:
              id:
                type: string
                format: uuid
              version:
                type: integer
                minimum: 1
              scope_type:
                $ref: '#/components/schemas/HotwordScopeType'
              scope_id:
                type: string
                format: uuid
    ReviewDecisionRequest:
      oneOf:
        - type: object
          additionalProperties: false
          required: [action, change_index]
          properties:
            action:
              type: string
              enum: [accept_change, reject_change]
            change_index:
              type: integer
              minimum: 0
        - type: object
          additionalProperties: false
          required: [action]
          properties:
            action:
              type: string
              enum: [accept_all, reject_all]
    ApprovalRequest:
      type: object
      additionalProperties: false
      properties:
        accept_pending:
          type: boolean
          default: false
    ReviewRecord:
      type: object
      additionalProperties: false
      required: [id, revision_id, reviewer_id, action, created_at]
      properties:
        id:
          type: string
          format: uuid
        revision_id:
          type: string
          format: uuid
        reviewer_id:
          type: string
          format: uuid
        action:
          type: string
          enum: [accept_change, reject_change, accept_all, reject_all, approve]
        change_index:
          type: integer
          minimum: 0
        resulting_revision_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
    ApprovalResult:
      type: object
      additionalProperties: false
      required: [review, human_revision, approved_revision]
      properties:
        review:
          $ref: '#/components/schemas/ReviewRecord'
        human_revision:
          $ref: '#/components/schemas/TranscriptRevision'
        approved_revision:
          $ref: '#/components/schemas/TranscriptRevision'
    Language:
      type: string
      description: BCP 47-like language tag or `und` for undetermined.
      pattern: '^(?:und|[A-Za-z]{2,3}(?:-[A-Za-z0-9]{2,8})*)$'
    SHA256:
      type: string
      pattern: '^[0-9a-f]{64}$'
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/APIError'
    APIError:
      type: object
      additionalProperties: false
      required: [code, message, request_id]
      properties:
        code:
          $ref: '#/components/schemas/ErrorCode'
        message:
          type: string
          minLength: 1
        request_id:
          type: string
          minLength: 1
          maxLength: 200
    ErrorCode:
      type: string
      enum:
        - asset_not_ready
        - checksum_mismatch
        - correction_active
        - audit_unavailable
        - email_conflict
        - forbidden
        - glossary_conflict
        - hotword_conflict
        - idempotency_conflict
        - internal_error
        - invalid_credentials
        - invalid_pairing
        - invalid_request
        - last_owner_required
        - method_not_allowed
        - not_ready
        - not_found
        - origin_not_allowed
        - precondition_required
        - profile_conflict
        - rate_limited
        - request_too_large
        - review_conflict
        - revision_not_correctable
        - service_unavailable
        - encryption_unavailable
        - unauthorized
        - unsupported_media
        - unsupported_media_type
        - version_conflict
        - upload_conflict
        - upload_expired
        - upload_incomplete
