          type: object
          maxProperties: 32
          additionalProperties: true
        tencent_asr:
          type: object
          maxProperties: 32
          additionalProperties: true
    HotwordScopeType:
      type: string
      enum: [workspace, collection, asset]
    HotwordState:
      type: string
      enum: [enabled, disabled]
