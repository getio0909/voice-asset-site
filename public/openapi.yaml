      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        provider_id:
          $ref: '#/components/schemas/LLMProviderID'
        display_name:
          type: string
        config:
          $ref: '#/components/schemas/LLMConfig'
        state:
          type: string
          enum: [enabled, disabled]
        priority:
          type: integer
          minimum: 1
          maximum: 1000
        version:
          type: integer
          format: int64
          minimum: 1
        secret_configured:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    LLMProfileList:
